name: Generate Lightroom Translations

on:
  workflow_dispatch:
    inputs:
      languages:
        description: "List of target languages (space-separated, e.g., 'fr de it es'). Leave empty to generate English only."
        required: false
        default: ""

jobs:
  generate-translations:
    runs-on: ubuntu-latest
    name: Extract and update Lightroom translations

    permissions:
      contents: write

    steps:
      # Step 1: Checkout ONLY the main branch (shallow clone)
      - name: Checkout main branch (shallow)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1

      # Step 2: Configure Git identity
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      # Step 3: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 5: Run translation script
      - name: Run translation script
        run: |
          if [ -z "${{ inputs.languages }}" ]; then
            python3 translation.py
          else
            python3 translation.py ${{ inputs.languages }}
          fi

      # Step 6: Create a fresh 'translations' branch (orphan)
      - name: Create fresh 'translations' branch
        run: |
          git checkout --orphan translations
          git rm -rf .
          git clean -fd

      # Step 7: Copy ONLY translation files to the new branch
      - name: Copy translation files
        run: |
          git checkout main -- lr-inaturalist-publish.lrdevplugin/TranslatedStrings_*.txt
          git add lr-inaturalist-publish.lrdevplugin/TranslatedStrings_*.txt
          git commit -m "Update translation files [GitHub Actions]"
          git push origin translations --force
